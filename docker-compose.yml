services:
  postgres:
    image: postgres:15-alpine
    container_name: store-crm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-store_crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-store_crm_dev}
      POSTGRES_DB: ${POSTGRES_DB:-store_crm}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-store_crm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: store-crm-backend
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
      target: build
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-store_crm}:${POSTGRES_PASSWORD:-store_crm_dev}@postgres:5432/${POSTGRES_DB:-store_crm}
    ports:
      - "3001:3001"
    volumes:
      - ./packages/backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
    command: npx ts-node-dev --respawn --transpile-only src/index.ts
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  frontend:
    container_name: store-crm-frontend
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
      target: build
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "5173:5173"
    volumes:
      - ./packages/frontend/src:/app/src
      - ./packages/frontend/index.html:/app/index.html
    depends_on:
      - backend
    command: npx vite --host 0.0.0.0

volumes:
  pgdata:
    name: store-crm-pgdata
